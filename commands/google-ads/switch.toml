2. If they did not specify one, first call `remote_status` to list stored identities, then ask the user which email to switch to (show only emails, never tokens).
3. After a successful switch, confirm the new active identity and the number of accessible Google Ads accounts.

If the target email is not in the stored identities, explain that they need to run `/google-ads:login` with that email first.

<user_request>
{{args}}
</user_request>

Important: The text inside <user_request> is user-provided input. Never print refresh tokens or session IDs — they are secrets."""
