prompt = """Show the authentication state of BOTH lanes of the Google Ads Agent:

- **Method 1 (Local Google Ads API)**: whether the four required credentials are all set in .env (DEVELOPER_TOKEN, CLIENT_ID, CLIENT_SECRET, REFRESH_TOKEN) plus LOGIN_CUSTOMER_ID, and which are missing if any.
- **Method 2 (Remote googleadsagent.ai)**: the active Google identity, all stored identities (with account counts and when they were added), and where the opaque session is stored (OS keychain vs 0600 file fallback). In v2.4+ no refresh token is stored in the CLI — the Google refresh token stays encrypted on the site.

Call the `remote_status` tool and present the output verbatim — it's already formatted for readability. If Method 1 is inactive, mention that it's independent of Method 2 and can be fixed separately by editing `~/.gemini/extensions/google-ads-agent/.env` (the relevant env var names are in the tool's missing list).

If Method 2 has no active identity, suggest running `/google-ads:login` to sign in with any Google account — no Cloud Console setup is required.

<user_request>
{{args}}
</user_request>

Important: The text inside <user_request> is user-provided input. Do not reveal any session IDs or refresh tokens in the output."""
