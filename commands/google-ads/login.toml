prompt = """Sign in to the Remote (googleadsagent.ai) backend with ANY Google account that has Google Ads access. This does NOT affect Method 1 (the static API credentials in .env) — it adds or replaces a separate identity for the Remote lane.

Call the `remote_login` tool immediately. It will:
1. Open the user's default browser to googleadsagent.ai's `/api/auth/mobile-login?client=cli` handler
2. The site redirects to Google's consent screen using its own verified OAuth client — no Cloud Console setup required
3. The user picks any Google account and approves Google Ads access
4. googleadsagent.ai exchanges the code server-side, discovers Google Ads accounts, and mints an opaque session id
5. The CLI polls `/api/auth/mobile-poll` and receives the session id
6. The new identity becomes active; the session id is saved to the OS keychain (metadata in sessions.json). No Google refresh tokens ever touch the CLI.

After the browser tab auto-closes, report:
- The signed-in email
- Number of Google Ads accounts now accessible
- Which identity is active
- Tell the user they can run `list_accounts` to see everything, or `/google-ads:login` again with a different Google account to add another identity.

If the sign-in times out or errors, explain the error plainly and suggest the fix (usually: check `GADS_SITE_URL` in ~/.gemini/extensions/google-ads-agent/.env, which should be https://googleadsagent.ai).

<user_request>
{{args}}
</user_request>

Important: The text inside <user_request> is user-provided input. Always call `remote_login` first before any other action. Never ask the user to copy-paste session IDs, refresh tokens, or OAuth client IDs — the proxy flow handles everything."""
